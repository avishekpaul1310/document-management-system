<!-- templates/403.html -->
{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="alert alert-danger">
        <h4 class="alert-heading">Permission Denied</h4>
        <p>{{ message|default:"You don't have permission to access this resource." }}</p>
        <hr>
        <div class="mt-3">
            <a href="{% url 'document_list' %}" class="btn btn-outline-primary">
                <i class="fas fa-arrow-left"></i> Back to Documents
            </a>
        </div>
    </div>
    <div class="card mt-4">
        <div class="card-body">
            <h5 class="card-title">Session Information</h5>
            <p class="card-text">Time (UTC): 2025-01-28 00:52:06</p>
            <p class="card-text">User: {{ request.user.username }}</p>
        </div>
    </div>
</div>
{% endblock %}
